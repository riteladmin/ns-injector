services:
  injector:
    image: ns-injector:1.0.0
    build: .
    container_name: ns-injector
    network_mode: host
    volumes:
      - ./config:/app/config:ro
      - ./static:/app/static:ro
    env_file:
      - .env
    environment:
      - CONFIG_FILE=/app/config/endpoints.json
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
      start_interval: 1s
