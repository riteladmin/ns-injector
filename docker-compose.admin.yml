name: nsadmin   # isolated project — never manages the injector
# Additive control panel — separate container, reuses the injector image.
# READ+WRITE on config/static (admin only; the injector keeps its own read-only mounts).
# Bound to the VLAN IP only (WireGuard/LAN), never behind the public Caddy.
services:
  admin:
    image: ns-injector:1.0.0
    container_name: ns-injector-admin
    network_mode: host
    user: "0:0"            # root: needed to write the mixed-ownership config/static bind mounts
    working_dir: /app
    command: ["uvicorn","admin.main:app","--host","192.168.40.169","--port","8001"]
    volumes:
      - ./config:/app/config:rw
      - ./static:/app/static:rw
      - ./admin:/app/admin:ro
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - CONFIG_FILE=/app/config/endpoints.json
      - STATIC_DIR=/app/static
    restart: unless-stopped
    read_only: true        # rootfs read-only; only the rw bind mounts above are writable
    tmpfs:
      - /tmp
    mem_limit: 128m
    cpus: 0.25
